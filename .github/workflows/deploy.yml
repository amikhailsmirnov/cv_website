name: Deploy to GitHub Pages

# Publishes site/index.html — the exact artifact version of the CV — as the
# GitHub Pages site. It is fully self-contained (videos and resume embedded
# as data URIs), so no build step is needed. The React source in src/ remains
# for future development.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
