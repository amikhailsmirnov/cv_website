<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✳️</text></svg>"
    />
    <title>Mikhail Smirnov · AI Automation Architect & Head of BD</title>
    <!-- Apply the saved/OS theme before first paint to avoid a flash -->
    <script>
      try {
        var t = localStorage.getItem('cv-theme');
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches))
          document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
    <meta
      name="description"
      content="Mikhail Smirnov, AI Automation Architect and Head of Business Development. Two sides, one person."
    />
    <!-- Social link previews (LinkedIn, Telegram, Slack, X) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mikhail Smirnov · AI Automation Architect & Head of BD" />
    <meta
      property="og:description"
      content="AI Automation Architect and Head of Business Development. Two sides, one person. Hover the portrait to move between them."
    />
    <meta property="og:site_name" content="Mikhail Smirnov" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Mikhail Smirnov · AI Automation Architect & Head of BD" />
    <meta
      name="twitter:description"
      content="AI Automation Architect and Head of Business Development. Two sides, one person."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
